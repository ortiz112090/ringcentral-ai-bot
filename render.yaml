# Render Blueprint for the SR22 AI Voice Bot.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ringcentral-ai-bot
    runtime: node
    plan: starter # long-running service; bump as call volume grows
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      # PUBLIC_BASE_URL should be this service's Render URL, e.g.
      # https://ringcentral-ai-bot.onrender.com — set after first deploy.
      - key: PUBLIC_BASE_URL
        sync: false
      # ---- Secrets: set these in the Render dashboard (sync:false = not in git) ----
      - key: RINGCENTRAL_CLIENT_ID
        sync: false
      - key: RINGCENTRAL_CLIENT_SECRET
        sync: false
      - key: RINGCENTRAL_SERVER_URL
        value: https://platform.ringcentral.com
      - key: RINGCENTRAL_JWT
        sync: false
      - key: ESCALATION_QUEUE_EXTENSION
        sync: false
      - key: RINGCENTRAL_WEBHOOK_VERIFICATION_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Chat model for the SMS text path + learning lesson extraction.
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o
      # ---- Realtime (live voice) speech-to-speech pipeline ----
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-realtime-preview
      - key: OPENAI_REALTIME_VOICE
        value: alloy
      - key: OPENAI_REALTIME_AUDIO_FORMAT
        value: g711_ulaw
      - key: OPENAI_STT_MODEL
        value: gpt-4o-transcribe
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy
      - key: SUPABASE_URL
        value: https://hiqyfprmtipgrvwadqdb.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AGENT_NAME
        sync: false
      - key: BROKERAGE_NAME
        sync: false
